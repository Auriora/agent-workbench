name: Cross-platform packaging

# Spec 033 verification: the postinstall pointer, MCP launch, and hook paths
# must work shell-free on Windows, macOS, and Linux. Each job installs the
# package's dependencies (so npm/pnpm builds the native modules) and runs the
# end-to-end smokes against this checkout as the in-place runtime root.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packaging-matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (not windows-latest): the newer windows-latest image
        # ships Visual Studio 18, which node-gyp 11.x reports as an unknown
        # version and refuses to use for the tree-sitter native build (it won't
        # fall back to VS2017 on Node 22+). windows-2022 has the VS that node-gyp
        # detects. Tracked to revisit when node-gyp gains VS18 support.
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4

      # Node 22 is the supported floor (spec 033 Requirement 4.1). The
      # tree-sitter core needs C++20, which Node 24's V8 headers require but
      # Node 22's do not — so 22 is the build-clean floor.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Activate pnpm via corepack (bundled with Node) instead of a third-party
      # action — the repo's Actions allowlist permits only github-owned and
      # verified-creator actions, so pnpm/action-setup fails at startup. Works
      # identically on Windows/macOS/Linux. Version from package.json#/packageManager.
      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

      # Build the native modules the way an end user's `npm install` would, then
      # run the smokes against this checkout as the in-place runtime root. A red
      # leg here is a real native-build or launch defect on that OS — not a
      # copy-step artifact (there is no copy-to-prefix step any more).
      - name: Install dependencies (builds tree-sitter + native modules)
        run: pnpm install --frozen-lockfile

      - name: Postinstall pointer smoke — records the in-place runtime root
        run: node scripts/ci/install-smoke.mjs

      - name: MCP launch smoke — shim -> entrypoint -> stdio initialize handshake
        run: node scripts/ci/mcp-launch-smoke.mjs

      - name: Hook smoke — SessionStart + PostToolUse, no shell error
        run: node scripts/ci/hook-smoke.mjs

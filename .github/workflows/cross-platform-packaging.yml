name: Cross-platform packaging

# Spec 033 verification: the install, MCP launch, and hook paths must work
# shell-free on Windows, macOS, and Linux. Each job installs the runtime to a
# temp prefix and runs the end-to-end smokes against that installed copy.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packaging-matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # Shared install prefix for the install -> launch -> hook smoke chain.
      AW_CI_PREFIX: ${{ runner.temp }}/agent-workbench-ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      # Node 22 is the supported floor (spec 033 Requirement 4.1).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # NOTE: installing deps first means the install smoke exercises the
      # node_modules-COPY path (verbatimSymlinks over the pnpm link farm), which
      # is the Windows-fragile path flagged in the spec's verification.md. A red
      # Windows leg may be the copy step on the junction farm — not a launch/hook
      # defect. The canonical Windows install is the rebuild path (no packaged
      # node_modules); see verification.md residual risks before diagnosing.
      - name: Install dependencies (provides tsx + native modules for the smokes)
        run: pnpm install --frozen-lockfile

      - name: Install smoke (T011a) — copy runtime, sanitize, generate launcher
        run: node scripts/ci/install-smoke.mjs

      - name: MCP launch smoke (T011b) — stdio initialize handshake
        run: node scripts/ci/mcp-launch-smoke.mjs

      - name: Hook smoke (T011c) — SessionStart + PostToolUse, no shell error
        run: node scripts/ci/hook-smoke.mjs

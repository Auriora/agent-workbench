name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate plugin and package metadata
        run: pnpm run validate:plugin

      - name: Postinstall pointer + MCP launch smoke
        run: |
          node scripts/ci/install-smoke.mjs
          node scripts/ci/mcp-launch-smoke.mjs

      - name: Validate npm package payload
        run: pnpm pack:dry-run

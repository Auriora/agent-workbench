name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Activate pnpm via corepack (bundled with Node) instead of a third-party
      # action — the repo's Actions allowlist permits only github-owned and
      # verified-creator actions, so pnpm/action-setup fails at startup. Version
      # comes from package.json#/packageManager (pnpm@10.18.1).
      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

      # Node 24's V8 headers require C++20 to compile the tree-sitter core from
      # source; Node 22 does not. ci.yml runs on Node 24, so set the flag here
      # (the same workaround documented for end users). Grammars + better-sqlite3
      # ship prebuilds and are unaffected.
      - name: Install dependencies
        env:
          CXXFLAGS: -std=c++20
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate plugin and package metadata
        run: pnpm run validate:plugin

      - name: Postinstall pointer + MCP launch smoke
        run: |
          node scripts/ci/install-smoke.mjs
          node scripts/ci/mcp-launch-smoke.mjs

      - name: Validate npm package payload
        run: pnpm pack:dry-run
